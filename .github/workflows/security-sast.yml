---
name: SAST
'on':
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config auto --error --exclude 'node_modules' --exclude '_build' --exclude 'coverage'
        env:
          SEMGREP_RULES: >-
            p/javascript
            p/security-audit
            p/secrets
            p/command-injection
